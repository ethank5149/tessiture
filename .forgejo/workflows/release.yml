name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump strategy"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
          - none

jobs:
  test:
    name: Test
    runs-on: docker
    container: python:3.12-bookworm

    steps:
      - name: Checkout
        shell: bash
        run: |
          AUTH_URL=$(echo "${{ github.server_url }}" | sed "s|://|://oauth2:${{ github.token }}@|")
          git clone "${AUTH_URL}/${{ github.repository }}.git" .
          git fetch --tags

      - name: Install system dependencies
        shell: bash
        run: |
          apt-get update -qq
          apt-get install -y -qq ca-certificates curl gnupg libsndfile1 ffmpeg
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y -qq nodejs

      - name: Install Python dependencies
        shell: bash
        run: pip install -r requirements.txt -e ".[dev]"

      - name: Run backend tests
        shell: bash
        run: python -m pytest tests/ -q --tb=short

      - name: Install frontend dependencies
        shell: bash
        run: cd frontend && npm ci

      - name: Run frontend tests
        shell: bash
        run: cd frontend && npm run test -- --run

      - name: Build frontend
        shell: bash
        run: cd frontend && npm run build

  build-and-push:
    name: Build and Push Image
    runs-on: docker
    needs: test

    steps:
      - name: Install bash
        shell: sh
        run: |
          command -v bash >/dev/null 2>&1 || apk add --no-cache bash || apt-get install -y bash

      - name: Checkout
        shell: bash
        run: |
          AUTH_URL=$(echo "${{ github.server_url }}" | sed "s|://|://oauth2:${{ github.token }}@|")
          git clone "${AUTH_URL}/${{ github.repository }}.git" .
          git fetch --tags

      - name: Configure git identity
        shell: bash
        run: |
          git config user.name "Forgejo Actions"
          git config user.email "actions@forgejo.local"

      - name: Connect to Docker daemon
        shell: bash
        run: |
          unset DOCKER_TLS_VERIFY DOCKER_CERT_PATH
          if ! docker info >/dev/null 2>&1; then
            export DOCKER_HOST="tcp://172.40.0.2:2375"
            docker info >/dev/null 2>&1 || { echo "::error::Cannot reach Docker daemon"; exit 1; }
            echo "DOCKER_HOST=tcp://172.40.0.2:2375" >> "${GITHUB_ENV}"
          fi
          echo "DOCKER_TLS_VERIFY=" >> "${GITHUB_ENV}"
          echo "DOCKER_CERT_PATH=" >> "${GITHUB_ENV}"

      - name: Log in to Forgejo registry
        shell: bash
        run: |
          unset DOCKER_TLS_VERIFY DOCKER_CERT_PATH
          echo "${{ secrets.FORGEJO_PACKAGE_TOKEN }}" | docker login forgejo.dojo-diminished.ts.net \
            --username "${{ github.repository_owner }}" \
            --password-stdin

      - name: Build and push image
        timeout-minutes: 30
        shell: bash
        run: |
          unset DOCKER_TLS_VERIFY DOCKER_CERT_PATH
          mkdir -p examples/tracks
          deploy/scripts/build.sh \
            --version-bump "${{ inputs.version_bump || 'auto' }}" \
            --env-file deploy/.env.ci \
            --push \
            --cache-ref "forgejo.dojo-diminished.ts.net/${{ github.repository }}:buildcache"

      - name: Read release version
        id: version
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < .release-version)"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Release version: ${VERSION}"

      - name: Create and push git tag
        shell: bash
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping"
          else
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          fi

      - name: Log out of registry
        if: always()
        shell: bash
        run: |
          unset DOCKER_TLS_VERIFY DOCKER_CERT_PATH
          docker buildx rm tessiture-builder 2>/dev/null || true
          docker logout forgejo.dojo-diminished.ts.net 2>/dev/null || true

  deploy:
      name: Deploy to SkyNet
      runs-on: ubuntu-latest
      needs: build-and-push

      steps:
        - name: Install dependencies
          run: apt-get update -qq && apt-get install -y -qq git
        
        - name: Checkout
          shell: bash
          run: |
            AUTH_URL=$(echo "${{ github.server_url }}" | sed "s|://|://oauth2:${{ github.token }}@|")
            git clone "${AUTH_URL}/${{ github.repository }}.git" .

        - name: Write .env
          shell: bash
          run: echo "${{ secrets.TESSITURE_ENV }}" > deploy/.env

        - name: Pull and deploy
          shell: bash
          run: |
            REGISTRY="forgejo.dojo-diminished.ts.net"
            IMAGE="${REGISTRY}/${{ github.repository }}:latest"
            echo "${{ github.token }}" | docker login "${REGISTRY}" \
              --username "${{ github.repository_owner }}" \
              --password-stdin
            docker pull "${IMAGE}"
            docker logout "${REGISTRY}"
            TESSITURE_IMAGE="${IMAGE}" deploy/scripts/deploy.sh \
              --env-file deploy/.env \
              --compose-file deploy/docker-compose.yml

        - name: Verify deployment
          shell: bash
          run: |
            TIMEOUT=120
            ELAPSED=0
            while true; do
              STATUS=$(docker inspect --format '{{.State.Health.Status}}' tessiture 2>/dev/null || echo "missing")
              [[ "${STATUS}" == "healthy" ]] && { echo "tessiture is healthy"; break; }
              (( ELAPSED >= TIMEOUT )) && { echo "ERROR: timed out (status: ${STATUS})" >&2; docker logs tessiture --tail 50; exit 1; }
              echo "Waiting... (${ELAPSED}s, status: ${STATUS})"
              sleep 10; ELAPSED=$(( ELAPSED + 10 ))
            done

        - name: Deployment summary
          shell: bash
          run: |
            echo "========================================"
            echo "  Tessiture deployed successfully"
            echo "  Image : forgejo.dojo-diminished.ts.net/${{ github.repository }}:latest"
            echo "  Time  : $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "========================================"