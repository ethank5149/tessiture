name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump strategy"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - patch
          - minor
          - none

jobs:
  test:
    name: Test
    runs-on: docker
    container: python:3.12-bookworm
    env:
      GITHUB_API_URL: http://forgejo/api/v1
      GITHUB_SERVER_URL: http://forgejo
      ACTIONS_CACHE_URL: http://forgejo/api/v1

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          SERVER="${{ github.server_url }}"
          REPO="${{ github.repository }}"
          TOKEN="${{ github.token }}"
          AUTH_URL=$(echo "${SERVER}" | sed "s|://|://oauth2:${TOKEN}@|")
          git clone "${AUTH_URL}/${REPO}.git" .
          git fetch --tags

      - name: Install Node.js 20
        shell: bash
        run: |
          apt-get update -qq
          apt-get install -y -qq ca-certificates curl gnupg
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y -qq nodejs
          node --version
          npm --version

      - name: Restore pip cache (from previous run)
        shell: bash
        run: |
          FORGEJO_URL="http://forgejo"
          CACHE_KEY="pip-${{ hashFiles('requirements.txt', 'pyproject.toml') }}"
          CACHE_DIR="~/.cache/pip"
          
          # Try to restore cache
          if curl -s -f -o /tmp/cache.tar.gz -H "Authorization: Bearer ${{ github.token }}" \
            "$FORGEJO_URL/api/v1/actions/caches?key=$CACHE_KEY" 2>/dev/null; then
            if [ -s /tmp/cache.tar.gz ]; then
              mkdir -p "$CACHE_DIR"
              tar -xzf /tmp/cache.tar.gz -C "$CACHE_DIR" 2>/dev/null || true
              echo "Cache restored for $CACHE_KEY"
            fi
          fi

      - name: Restore npm cache (from previous run)
        shell: bash
        run: |
          FORGEJO_URL="http://forgejo"
          CACHE_KEY="npm-${{ hashFiles('frontend/package-lock.json') }}"
          CACHE_DIR="~/.npm"
          
          # Try to restore cache
          if curl -s -f -o /tmp/cache.tar.gz -H "Authorization: Bearer ${{ github.token }}" \
            "$FORGEJO_URL/api/v1/actions/caches?key=$CACHE_KEY" 2>/dev/null; then
            if [ -s /tmp/cache.tar.gz ]; then
              mkdir -p "$CACHE_DIR"
              tar -xzf /tmp/cache.tar.gz -C "$CACHE_DIR" 2>/dev/null || true
              echo "Cache restored for $CACHE_KEY"
            fi
          fi

      - name: Install Python dependencies
        shell: bash
        run: pip install -r requirements.txt

      - name: Save pip cache (for future runs)
        if: always()
        shell: bash
        run: |
          FORGEJO_URL="http://forgejo"
          CACHE_KEY="pip-${{ hashFiles('requirements.txt', 'pyproject.toml') }}"
          CACHE_DIR="~/.cache/pip"
          
          if [ -d "$CACHE_DIR" ] && [ "$(ls -A $CACHE_DIR 2>/dev/null)" ]; then
            tar -czf /tmp/cache.tar.gz -C "$CACHE_DIR" . 2>/dev/null
            SIZE=$(stat -c%s /tmp/cache.tar.gz 2>/dev/null || stat -f%z /tmp/cache.tar.gz 2>/dev/null)
            if [ "$SIZE" -gt 100 ]; then
              echo "Cache size: $SIZE bytes"
              # Create cache entry and get upload URL
              RESPONSE=$(curl -s -X POST -H "Authorization: Bearer ${{ github.token }}" \
                -H "Content-Type: application/json" \
                -d "{\"key\":\"$CACHE_KEY\",\"size\":$SIZE}" \
                "$FORGEJO_URL/api/v1/actions/caches")
              echo "Create response: $RESPONSE"
              
              # Extract upload URL and upload the archive
              UPLOAD_URL=$(echo "$RESPONSE" | grep -o '"archive_upload_url":"[^"]*' | cut -d'"' -f4)
              if [ -n "$UPLOAD_URL" ]; then
                echo "Uploading to: $UPLOAD_URL"
                curl -X PUT -H "Content-Type: application/gzip" \
                  --data-binary @/tmp/cache.tar.gz \
                  "$UPLOAD_URL" -w "Upload status: %{http_code}\n"
                echo "Cache saved successfully for $CACHE_KEY"
              else
                echo "Failed to get upload URL"
              fi
            fi
          fi

      - name: Run backend tests
        shell: bash
        run: python -m pytest tests/ -q --tb=short

      - name: Install frontend dependencies
        shell: bash
        run: cd frontend && npm ci

      - name: Run frontend tests
        shell: bash
        run: cd frontend && npm run test -- --run

      - name: Build frontend
        shell: bash
        run: cd frontend && npm run build

      - name: Save npm cache (for future runs)
        if: always()
        shell: bash
        run: |
          FORGEJO_URL="http://forgejo"
          CACHE_KEY="npm-${{ hashFiles('frontend/package-lock.json') }}"
          CACHE_DIR="~/.npm"
          
          if [ -d "$CACHE_DIR" ] && [ "$(ls -A $CACHE_DIR 2>/dev/null)" ]; then
            tar -czf /tmp/npm-cache.tar.gz -C "$CACHE_DIR" . 2>/dev/null
            SIZE=$(stat -c%s /tmp/npm-cache.tar.gz 2>/dev/null || stat -f%z /tmp/npm-cache.tar.gz 2>/dev/null)
            if [ "$SIZE" -gt 100 ]; then
              echo "Cache size: $SIZE bytes"
              # Create cache entry and get upload URL
              RESPONSE=$(curl -s -X POST -H "Authorization: Bearer ${{ github.token }}" \
                -H "Content-Type: application/json" \
                -d "{\"key\":\"$CACHE_KEY\",\"size\":$SIZE}" \
                "$FORGEJO_URL/api/v1/actions/caches")
              echo "Create response: $RESPONSE"
              
              # Extract upload URL and upload the archive
              UPLOAD_URL=$(echo "$RESPONSE" | grep -o '"archive_upload_url":"[^"]*' | cut -d'"' -f4)
              if [ -n "$UPLOAD_URL" ]; then
                echo "Uploading to: $UPLOAD_URL"
                curl -X PUT -H "Content-Type: application/gzip" \
                  --data-binary @/tmp/npm-cache.tar.gz \
                  "$UPLOAD_URL" -w "Upload status: %{http_code}\n"
                echo "Cache saved successfully for $CACHE_KEY"
              else
                echo "Failed to get upload URL"
              fi
            fi
          fi

  build-and-deploy:
    name: Build and Deploy
    runs-on: docker
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Install bash
        shell: sh
        run: |
          if ! command -v bash >/dev/null 2>&1; then
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache bash
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update -qq && apt-get install -y -qq bash
            fi
          fi

      - name: Checkout repository
        shell: bash
        run: |
          SERVER="${{ github.server_url }}"
          REPO="${{ github.repository }}"
          TOKEN="${{ github.token }}"
          # Embed token in clone URL so origin remote has auth for git push later
          AUTH_URL=$(echo "${SERVER}" | sed "s|://|://oauth2:${TOKEN}@|")
          git clone "${AUTH_URL}/${REPO}.git" .
          git fetch --tags

      - name: Configure git identity for tagging
        shell: bash
        run: |
          git config user.name "Forgejo Actions"
          git config user.email "actions@forgejo.local"

      - name: Write deploy/.env from secret
        shell: bash
        run: |
          mkdir -p deploy
          echo "${{ secrets.TESSITURE_ENV }}" > deploy/.env

      - name: Set image reference in deploy/.env
        shell: bash
        run: |
          # Use the Tailscale FQDN for the registry — auth tokens are issued for this hostname
          # and blob uploads must go to the same host. The runner resolves it via /etc/hosts.
          REGISTRY="forgejo.dojo-diminished.ts.net"
          IMAGE="${REGISTRY}/${{ github.repository }}:latest"
          if grep -q '^TESSITURE_IMAGE=' deploy/.env; then
            sed -i "s|^TESSITURE_IMAGE=.*|TESSITURE_IMAGE=${IMAGE}|" deploy/.env
          else
            echo "TESSITURE_IMAGE=${IMAGE}" >> deploy/.env
          fi
          echo "Set TESSITURE_IMAGE=${IMAGE}"
          echo "REGISTRY=${REGISTRY}" >> "${GITHUB_ENV}"

      - name: Add Forgejo hostname to /etc/hosts
        shell: bash
        run: |
          # Map the Tailscale FQDN to the Tailscale IP so the runner can reach it.
          # Tailscale handles HTTPS (port 443) and proxies to Forgejo's HTTP port 1003.
          FORGEJO_FQDN="forgejo.dojo-diminished.ts.net"
          TAILSCALE_IP="100.95.62.8"
          echo "${TAILSCALE_IP} ${FORGEJO_FQDN}" >> /etc/hosts
          echo "Added ${TAILSCALE_IP} ${FORGEJO_FQDN} to /etc/hosts"
          curl -sf --max-time 5 "https://${FORGEJO_FQDN}/v2/" -o /dev/null && echo "HTTPS reachable" || echo "HTTPS check failed"

      - name: Make scripts executable
        shell: bash
        run: chmod +x deploy/scripts/build.sh deploy/scripts/deploy.sh

      - name: Log in to Forgejo container registry
        env:
          GIT_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          echo "${GIT_TOKEN}" | docker login "${REGISTRY}" \
            --username "${{ github.repository_owner }}" \
            --password-stdin

      - name: Build and push Docker image
        timeout-minutes: 30
        env:
          GIT_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # examples/ is gitignored (runtime data); create empty dir so Dockerfile COPY succeeds
          mkdir -p examples/tracks
          CACHE_REF="${REGISTRY}/${{ github.repository }}:buildcache"
          deploy/scripts/build.sh \
            --version-bump "${{ inputs.version_bump || 'auto' }}" \
            --env-file deploy/.env \
            --no-git-tag \
            --push \
            --cache-ref "${CACHE_REF}"

      - name: Deploy stack
        timeout-minutes: 10
        shell: bash
        run: |
          deploy/scripts/deploy.sh \
            --env-file deploy/.env \
            --compose-file deploy/docker-compose.yml

      - name: Verify deployment
        shell: bash
        run: |
          echo "Waiting for container 'tessiture' to be running..."
          TIMEOUT=120
          INTERVAL=10
          ELAPSED=0
          while true; do
            STATUS=$(docker inspect --format '{{.State.Health.Status}}' tessiture 2>/dev/null || echo "missing")
            if [[ "${STATUS}" == "healthy" ]]; then
              echo "Container 'tessiture' is running"
              break
            fi
            if (( ELAPSED >= TIMEOUT )); then
              echo "ERROR: Deployment health check timed out after ${TIMEOUT}s (last status: ${STATUS})" >&2
              docker ps
              exit 1
            fi
            echo "Not yet running (${ELAPSED}s elapsed); retrying in ${INTERVAL}s..."
            sleep "${INTERVAL}"
            ELAPSED=$(( ELAPSED + INTERVAL ))
          done

      - name: Read release version
        id: version
        shell: bash
        run: |
          if [[ ! -f .release-version ]]; then
            echo "ERROR: .release-version not found after build" >&2
            exit 1
          fi
          VERSION="$(tr -d '[:space:]' < .release-version)"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Release version: ${VERSION}"

      - name: Create and push git tag
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping"
          else
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
            echo "Pushed tag ${TAG} to Forgejo"
          fi

      - name: Deployment summary
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "========================================"
          echo "  Tessiture Release Summary"
          echo "========================================"
          echo "  Version   : v${VERSION}"
          echo "  Image     : $(grep TESSITURE_IMAGE deploy/.env | cut -d= -f2-)"
          echo "  Timestamp : $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "========================================"

      - name: Log out of container registry
        if: always()
        shell: bash
        run: docker logout "${REGISTRY}" 2>/dev/null || true
