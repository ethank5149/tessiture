name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump strategy"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - patch
          - minor
          - none

jobs:
  test:
    name: Test
    runs-on: docker
    container: python:3.12-bookworm

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          SERVER="${{ github.server_url }}"
          REPO="${{ github.repository }}"
          TOKEN="${{ github.token }}"
          AUTH_URL=$(echo "${SERVER}" | sed "s|://|://oauth2:${TOKEN}@|")
          git clone "${AUTH_URL}/${REPO}.git" .
          git fetch --tags

      - name: Install Node.js 20
        shell: bash
        run: |
          apt-get update -qq
          apt-get install -y -qq ca-certificates curl gnupg
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y -qq nodejs
          node --version
          npm --version

      - name: Install Python dependencies
        shell: bash
        run: pip install -r requirements.txt

      - name: Run backend tests
        shell: bash
        run: python -m pytest tests/ -q --tb=short

      - name: Install frontend dependencies
        shell: bash
        run: cd frontend && npm ci

      - name: Run frontend tests
        shell: bash
        run: cd frontend && npm run test -- --run

      - name: Build frontend
        shell: bash
        run: cd frontend && npm run build

  build-and-deploy:
    name: Build and Deploy
    runs-on: docker
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Install bash
        shell: sh
        run: |
          if ! command -v bash >/dev/null 2>&1; then
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache bash
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update -qq && apt-get install -y -qq bash
            fi
          fi

      - name: Checkout repository
        shell: bash
        run: |
          SERVER="${{ github.server_url }}"
          REPO="${{ github.repository }}"
          TOKEN="${{ github.token }}"
          # Embed token in clone URL so origin remote has auth for git push later
          AUTH_URL=$(echo "${SERVER}" | sed "s|://|://oauth2:${TOKEN}@|")
          git clone "${AUTH_URL}/${REPO}.git" .
          git fetch --tags

      - name: Configure git identity for tagging
        shell: bash
        run: |
          git config user.name "Forgejo Actions"
          git config user.email "actions@forgejo.local"

      - name: Write deploy/.env from secret
        shell: bash
        run: |
          mkdir -p deploy
          echo "${{ secrets.TESSITURE_ENV }}" > deploy/.env

      - name: Set image reference in deploy/.env
        shell: bash
        run: |
          # Derive registry from the existing TESSITURE_IMAGE in deploy/.env (set by secret).
          # This uses the correct Tailscale FQDN (forgejo.dojo-diminished.ts.net) with HTTPS.
          CURRENT_IMAGE=$(grep '^TESSITURE_IMAGE=' deploy/.env | cut -d= -f2- | tr -d '"' || true)
          if [ -n "${CURRENT_IMAGE}" ]; then
            REGISTRY=$(echo "${CURRENT_IMAGE}" | cut -d/ -f1)
            REPO_PATH="${{ github.repository }}"
            IMAGE="${REGISTRY}/${REPO_PATH}:latest"
          else
            REGISTRY=$(echo "${{ github.server_url }}" | sed 's|https://||' | sed 's|http://||')
            IMAGE="${REGISTRY}/${{ github.repository }}:latest"
          fi
          if grep -q '^TESSITURE_IMAGE=' deploy/.env; then
            sed -i "s|^TESSITURE_IMAGE=.*|TESSITURE_IMAGE=${IMAGE}|" deploy/.env
          else
            echo "TESSITURE_IMAGE=${IMAGE}" >> deploy/.env
          fi
          echo "Set TESSITURE_IMAGE=${IMAGE}"
          echo "REGISTRY=${REGISTRY}" >> "${GITHUB_ENV}"

      - name: Resolve Tailscale registry hostname
        shell: bash
        run: |
          # The DinD daemon can't resolve Tailscale hostnames. Resolve via host network
          # and add to /etc/hosts so skopeo (running in this container) can reach the registry.
          echo "Resolving ${REGISTRY}..."
          REGISTRY_IP=$(docker run --rm --network host alpine:3 \
            sh -c "getent hosts ${REGISTRY} | awk '{print \$1}' | head -1" 2>/dev/null || true)
          echo "Resolved ${REGISTRY} -> ${REGISTRY_IP}"
          if [ -n "${REGISTRY_IP}" ]; then
            echo "${REGISTRY_IP} ${REGISTRY}" >> /etc/hosts
            echo "Added ${REGISTRY_IP} ${REGISTRY} to /etc/hosts"
          else
            echo "WARNING: Could not resolve ${REGISTRY} via host network"
          fi

      - name: Make scripts executable
        shell: bash
        run: chmod +x deploy/scripts/build.sh deploy/scripts/deploy.sh

      - name: Install skopeo
        shell: bash
        run: |
          if ! command -v skopeo >/dev/null 2>&1; then
            if command -v apk >/dev/null 2>&1; then
              apk add --no-cache skopeo
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update -qq && apt-get install -y -qq skopeo
            fi
          fi
          skopeo --version

      - name: Log in to Forgejo container registry
        env:
          GIT_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # Use skopeo login (runs in this container, uses our /etc/hosts).
          # docker login would go through the DinD daemon which can't resolve the hostname.
          echo "${GIT_TOKEN}" | skopeo login "${REGISTRY}" \
            --username "${{ github.repository_owner }}" \
            --password-stdin

      - name: Build and push Docker image
        timeout-minutes: 30
        shell: bash
        run: |
          # examples/ is gitignored (runtime data); create empty dir so Dockerfile COPY succeeds
          mkdir -p examples/tracks
          # Build locally (no push) — DinD daemon can't resolve the Tailscale registry hostname
          deploy/scripts/build.sh \
            --version-bump "${{ inputs.version_bump || 'auto' }}" \
            --env-file deploy/.env \
            --no-git-tag
          # Push via skopeo: save from DinD daemon, push from this container
          IMAGE=$(grep '^TESSITURE_IMAGE=' deploy/.env | cut -d= -f2-)
          echo "Pushing ${IMAGE} via skopeo..."
          docker save "${IMAGE}" | skopeo copy docker-archive:/dev/stdin "docker://${IMAGE}"

      - name: Deploy stack
        timeout-minutes: 10
        shell: bash
        run: |
          deploy/scripts/deploy.sh \
            --env-file deploy/.env \
            --compose-file deploy/docker-compose.yml

      - name: Verify deployment
        shell: bash
        run: |
          echo "Waiting for container 'tessiture' to be running..."
          TIMEOUT=120
          INTERVAL=10
          ELAPSED=0
          while true; do
            STATUS=$(docker inspect --format '{{.State.Health.Status}}' tessiture 2>/dev/null || echo "missing")
            if [[ "${STATUS}" == "healthy" ]]; then
              echo "Container 'tessiture' is running"
              break
            fi
            if (( ELAPSED >= TIMEOUT )); then
              echo "ERROR: Deployment health check timed out after ${TIMEOUT}s (last status: ${STATUS})" >&2
              docker ps
              exit 1
            fi
            echo "Not yet running (${ELAPSED}s elapsed); retrying in ${INTERVAL}s..."
            sleep "${INTERVAL}"
            ELAPSED=$(( ELAPSED + INTERVAL ))
          done

      - name: Read release version
        id: version
        shell: bash
        run: |
          if [[ ! -f .release-version ]]; then
            echo "ERROR: .release-version not found after build" >&2
            exit 1
          fi
          VERSION="$(tr -d '[:space:]' < .release-version)"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Release version: ${VERSION}"

      - name: Create and push git tag
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping"
          else
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
            echo "Pushed tag ${TAG} to Forgejo"
          fi

      - name: Deployment summary
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "========================================"
          echo "  Tessiture Release Summary"
          echo "========================================"
          echo "  Version   : v${VERSION}"
          echo "  Image     : $(grep TESSITURE_IMAGE deploy/.env | cut -d= -f2-)"
          echo "  Timestamp : $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          echo "========================================"

      - name: Log out of container registry
        if: always()
        shell: bash
        run: |
          docker logout "${REGISTRY}" || true
