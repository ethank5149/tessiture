name: Test

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: docker
    container: python:3.12-bookworm
    env:
      GITHUB_API_URL: http://forgejo/api/v1
      GITHUB_SERVER_URL: http://forgejo
      ACTIONS_CACHE_URL: http://forgejo/api/v1

    steps:
      - name: Checkout repository
        shell: bash
        run: |
          SERVER="${{ github.server_url }}"
          REPO="${{ github.repository }}"
          TOKEN="${{ github.token }}"
          # Build authenticated URL: inject token into http(s):// URL
          AUTH_URL=$(echo "${SERVER}" | sed "s|://|://oauth2:${TOKEN}@|")
          git clone "${AUTH_URL}/${REPO}.git" .
          git fetch --tags

      - name: Install Node.js 20
        shell: bash
        run: |
          apt-get update -qq
          apt-get install -y -qq ca-certificates curl gnupg
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y -qq nodejs
          node --version
          npm --version

      - name: Cache pip packages
        shell: bash
        run: |
          set -x
          FORGEJO_URL="http://forgejo"
          CACHE_KEY="pip-${{ hashFiles('requirements.txt', 'pyproject.toml') }}"
          CACHE_DIR="~/.cache/pip"
          
          echo "Checking for cache key: $CACHE_KEY"
          curl -v -H "Authorization: Bearer ${{ github.token }}" \
            "$FORGEJO_URL/api/v1/actions/caches?key=$CACHE_KEY" 2>&1 | head -50
          echo "---"
          
          # Try to restore cache
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ github.token }}" \
            "$FORGEJO_URL/api/v1/actions/caches?key=$CACHE_KEY")
          echo "API Response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q 'archive_download_url'; then
            DOWNLOAD_URL=$(echo "$RESPONSE" | grep -o '"archive_download_url":"[^"]*' | cut -d'"' -f4)
            if [ -n "$DOWNLOAD_URL" ]; then
              mkdir -p "$CACHE_DIR"
              curl -L -o /tmp/cache.tar.gz "$DOWNLOAD_URL" 2>/dev/null && \
                tar -xzf /tmp/cache.tar.gz -C "$CACHE_DIR" 2>/dev/null && \
                echo "Cache restored for $CACHE_KEY" || echo "Cache restore failed"
            fi
          else
            echo "No cache found"
          fi

      - name: Cache npm packages
        shell: bash
        run: |
          set -x
          FORGEJO_URL="http://forgejo"
          CACHE_KEY="npm-${{ hashFiles('frontend/package-lock.json') }}"
          CACHE_DIR="~/.npm"
          
          echo "Checking for cache key: $CACHE_KEY"
          RESPONSE=$(curl -s -H "Authorization: Bearer ${{ github.token }}" \
            "$FORGEJO_URL/api/v1/actions/caches?key=$CACHE_KEY")
          echo "API Response: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q 'archive_download_url'; then
            DOWNLOAD_URL=$(echo "$RESPONSE" | grep -o '"archive_download_url":"[^"]*' | cut -d'"' -f4)
            if [ -n "$DOWNLOAD_URL" ]; then
              mkdir -p "$CACHE_DIR"
              curl -L -o /tmp/cache.tar.gz "$DOWNLOAD_URL" 2>/dev/null && \
                tar -xzf /tmp/cache.tar.gz -C "$CACHE_DIR" 2>/dev/null && \
                echo "Cache restored for $CACHE_KEY" || echo "Cache restore failed"
            fi
          else
            echo "No cache found"
          fi

      - name: Install Python dependencies
        shell: bash
        run: pip install -r requirements.txt -e ".[dev]"

      - name: Run backend tests
        shell: bash
        run: python -m pytest tests/ -q --tb=short

      - name: Install frontend dependencies
        shell: bash
        run: cd frontend && npm ci

      - name: Run frontend tests
        shell: bash
        run: cd frontend && npm run test -- --run

      - name: Build frontend
        shell: bash
        run: cd frontend && npm run build
