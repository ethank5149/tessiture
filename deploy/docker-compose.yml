services:
  tessiture:
    image: ${TESSITURE_IMAGE}
    container_name: tessiture
    restart: unless-stopped
    networks:
      - caddy-proxy
    ports:
      - "127.0.0.1:${TESSITURE_LAN_BIND_PORT:-8100}:${TESSITURE_PORT:-8000}"
    env_file:
      - ./.env
    volumes:
      - ${TESSITURE_UPLOAD_HOST_PATH}:${TESSITURE_UPLOAD_DIR}
      - ${TESSITURE_OUTPUT_HOST_PATH}:${TESSITURE_OUTPUT_DIR}
      - ${TESSITURE_STEM_CACHE_HOST_PATH:-/mnt/user/appdata/tessiture/stem_cache}:/data/stem_cache
      - ${TESSITURE_JOBS_HOST_PATH}:${TESSITURE_JOBS_DIR}
      - ${TESSITURE_LOG_HOST_PATH}:${TESSITURE_LOG_DIR}
      - ${TESSITURE_EXAMPLES_HOST_PATH:-./../examples/tracks}:${TESSITURE_EXAMPLES_DIR}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,socket; s=socket.create_connection(('127.0.0.1', int(os.getenv('TESSITURE_PORT','8000'))), 2); s.close()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Host network mode for DinD/container environments without Docker-in-Docker port publishing

networks:
  caddy-proxy:
    external: true
