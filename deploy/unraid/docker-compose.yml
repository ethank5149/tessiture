services:
  tessiture:
    image: ${TESSITURE_IMAGE}
    container_name: tessiture
    restart: unless-stopped
    env_file:
      - ./.env.unraid
    environment:
      TESSITURE_ENV: ${TESSITURE_ENV}
      TESSITURE_HOST: ${TESSITURE_HOST}
      TESSITURE_PORT: ${TESSITURE_PORT}
      TESSITURE_UPLOAD_DIR: ${TESSITURE_UPLOAD_DIR}
      TESSITURE_OUTPUT_DIR: ${TESSITURE_OUTPUT_DIR}
      TESSITURE_EXAMPLES_DIR: ${TESSITURE_EXAMPLES_DIR:-/app/examples/tracks}
      TESSITURE_UPLOAD_MAX_BYTES: ${TESSITURE_UPLOAD_MAX_BYTES}
      TESSITURE_RATE_LIMIT_CAPACITY: ${TESSITURE_RATE_LIMIT_CAPACITY}
      TESSITURE_RATE_LIMIT_REFILL_PER_SEC: ${TESSITURE_RATE_LIMIT_REFILL_PER_SEC}
      TESSITURE_CORS_ORIGINS: ${TESSITURE_CORS_ORIGINS}
    volumes:
      - ${TESSITURE_UPLOAD_HOST_PATH}:${TESSITURE_UPLOAD_DIR}
      - ${TESSITURE_OUTPUT_HOST_PATH}:${TESSITURE_OUTPUT_DIR}
      - ${TESSITURE_STEM_CACHE_HOST_PATH:-/mnt/user/appdata/tessiture/stem_cache}:/data/stem_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,socket; s=socket.create_connection(('127.0.0.1', int(os.getenv('TESSITURE_PORT','8000'))), 2); s.close()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    # Publish on host loopback so host-network cloudflared can proxy to Tessiture.
    # This keeps Tessiture non-public on LAN while still reachable from cloudflared on the host namespace.
    ports:
      - "127.0.0.1:${TESSITURE_LAN_BIND_PORT}:${TESSITURE_PORT}"
    networks:
      - tessiture_internal
      - caddy_proxy

networks:
  tessiture_internal:
    name: tessiture_internal
    driver: bridge
    internal: true
  caddy_proxy:
    external: true
    name: caddy-proxy
